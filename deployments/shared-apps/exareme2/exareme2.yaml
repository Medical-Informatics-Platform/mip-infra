---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # This name will be overridden by the federation-specific kustomize patch
  name: exareme2
  namespace: argocd-mip-team
  annotations:
    argocd.argoproj.io/sync-wave: '1'
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  sources:
    - repoURL: https://github.com/madgik/exareme2
      targetRevision: cdfb9873e6675f646ac4267113607c7a18118610  # 1.0.0
      path: kubernetes
      helm:
        valueFiles:
          - values.yaml
          - $values/deployments/shared-apps/exareme2/values.yaml
    - repoURL: https://github.com/Medical-Informatics-Platform/mip-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    # This will be overridden by the federation-specific kustomize patch
    namespace: placeholder-namespace
  syncPolicy:
    syncOptions: [CreateNamespace=true, ApplyOutOfSyncOnly=true]
    automated:
      selfHeal: true
